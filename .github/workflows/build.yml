name: build

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tide_build:
    name: tide_build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate composer configuration
        run: composer validate --ansi --strict --no-check-all --no-check-lock

      - name: Install DDEV
        uses: ddev/github-action-setup-ddev@v1
        with:
          autostart: false

      - name: Start DDEV
        run: ddev start -y

      - name: Build Drupal site (poser)
        run: ddev poser

      - name: Symlink module into the site
        run: ddev symlink-project

      - name: Install site
        run: ddev install-site

      - name: Lint code
        run: ddev exec vendor/bin/phpcs .

      - name: Run PHPUnit unit tests
        run: ddev exec vendor/bin/phpunit --testsuite unit

      - name: Run Behat tests (tide_core)
        run: ddev exec vendor/bin/behat --strict --colors --tags='~@skipped' tests

      - name: Run Behat tests (tide_webform)
        run: |
          ddev drush en -y tide_webform
          ddev exec vendor/bin/behat --strict --colors --tags='~@skipped' modules/tide_webform

      - name: Run Behat tests (tide_media)
        run: |
          ddev drush en -y tide_media
          ddev exec vendor/bin/behat --strict --colors --tags='~@skipped' modules/tide_media

      - name: Run Behat tests (tide_event)
        run: |
          ddev drush en -y tide_event
          ddev exec vendor/bin/behat --strict --colors --tags='~@skipped' modules/tide_event

      - name: Run Behat tests (tide_grant)
        run: |
          ddev drush en -y tide_grant
          ddev exec vendor/bin/behat --strict --colors --tags='~@skipped' modules/tide_grant

      - name: Run Behat tests (tide_news)
        run: |
          ddev drush en -y tide_news
          ddev exec vendor/bin/behat --strict --colors --tags='~@skipped' modules/tide_news

      - name: Run Behat tests (tide_landing_page)
        run: |
          ddev drush en -y tide_landing_page
          ddev exec vendor/bin/behat --strict --colors --tags='~@skipped' modules/tide_landing_page

      - name: Run Behat tests (tide_site)
        run: |
          ddev drush en -y tide_site
          ddev exec vendor/bin/behat --strict --colors modules/tide_site

      - name: Run Behat tests (tide_ui_restriction)
        run: |
          ddev drush en -y tide_ui_restriction
          ddev exec vendor/bin/behat --strict --colors modules/tide_ui_restriction

      - name: Run Behat tests (tide_api)
        run: |
          ddev drush en -y tide_api tide_content_collection_ui tide_share_link
          ddev exec vendor/bin/behat --strict --colors --tags='~@skipped' modules/tide_api

      - name: Upload Behat screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: behat-screenshots
          path: screenshots
          if-no-files-found: ignore

  # TODO: export_config previously used the ahoy-based reusable workflow
