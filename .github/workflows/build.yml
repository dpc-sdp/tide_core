      # - name: Run Behat tests (per module)
      #   run: |
      #     for m in tide_webform tide_media tide_event tide_grant tide_news tide_landing_page; do
      #       ddev drush en -y "$m"
      #       ddev exec vendor/bin/behat --strict --colors --tags='~@skipped' "modules/$m"
      #     done
      #     ddev drush en -y tide_site
      #     ddev exec vendor/bin/behat --strict --colors modules/tide_site
      #     ddev drush en -y tide_ui_restriction
      #     ddev exec vendor/bin/behat --strict --colors modules/tide_ui_restriction
      #     ddev drush en -y tide_api tide_content_collection_ui tide_share_link
      #     ddev exec vendor/bin/behat --strict --colors --tags='~@skipped' modules/tide_api

