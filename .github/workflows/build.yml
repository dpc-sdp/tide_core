name: build

on:
  push:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tide_build:
    name: tide_build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate composer configuration
        run: composer validate --ansi --strict --no-check-all --no-check-lock

      - name: Install DDEV
        uses: ddev/github-action-setup-ddev@v1
        with:
          autostart: false

      - name: Start DDEV
        run: ddev start -y

      - name: Build Drupal site (poser)
        run: ddev poser

      - name: Symlink module into the site
        run: ddev symlink-project

      - name: Install site
        run: ddev install-site

      - name: Lint code
        run: ddev exec vendor/bin/phpcs .

      - name: Run PHPUnit unit tests
        run: ddev exec vendor/bin/phpunit --testsuite unit

      - name: Run Behat tests (tide_core)
        run: ddev exec vendor/bin/behat --strict --colors --tags='~@skipped' tests

      - name: Upload Behat screenshots
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: behat-screenshots
          path: screenshots
          if-no-files-found: ignore

      # TODO: per-module Behat suites are deferred while the DDEV migration
      # settles. Re-enable by uncommenting; the sequence mirrors the legacy
      # .circleci/test.sh (progressively enable each module, then run its
      # Behat suite).
