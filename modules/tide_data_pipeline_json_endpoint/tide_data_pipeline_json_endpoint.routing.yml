tide_data_pipeline_json_endpoint.push:
  path: '/api/datasets/{machine_name}/push'
  defaults:
    _controller: '\Drupal\tide_data_pipeline_json_endpoint\Controller\DatasetPushController::push'
    _title: 'Push Dataset Data'
  methods: [POST]
  requirements:
    _data_pipeline_api_key: 'TRUE'
  options:
    no_cache: TRUE
